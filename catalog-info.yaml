apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: backstage-temporal
  description: Backstage + Temporal integration sandbox
  annotations:
    github.com/project-slug: backstage-temporal/backstage-temporal
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  lifecycle: experimental
  owner: backstage-team
  system: backstage-temporal-system
  providesApis:
    - temporal-workflow-api
    - backstage-temporal-api

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: temporal-workflow-api
  description: REST API for managing Temporal workflows
  annotations:
    github.com/project-slug: backstage-temporal/backstage-temporal
spec:
  type: openapi
  lifecycle: experimental
  owner: backstage-team
  definition:
    $text: |
      openapi: 3.0.0
      info:
        title: Temporal Workflow API
        version: 1.0.0
        description: API for starting and monitoring Temporal workflows
      paths:
        /workflow/start:
          post:
            summary: Start a new workflow
            responses:
              '200':
                description: Workflow started successfully
        /workflow/status:
          get:
            summary: Get workflow status
            parameters:
              - name: id
                in: query
                required: true
                schema:
                  type: string
            responses:
              '200':
                description: Workflow status

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: backstage-temporal-api
  description: Combined API for Backstage-Temporal integration
  annotations:
    github.com/project-slug: backstage-temporal/backstage-temporal
spec:
  type: openapi
  lifecycle: experimental
  owner: backstage-team
  definition:
    $text: |
      openapi: 3.0.0
      info:
        title: Backstage Temporal API
        version: 1.0.0
        description: Complete API for Backstage and Temporal integration

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: backstage-temporal-frontend
  description: Backstage frontend application with Temporal integration
  tags:
    - react
    - typescript
    - backstage
  annotations:
    backstage.io/source-location: url:https://github.com/lloydchang/backstage-temporal/tree/master/frontend
spec:
  type: website
  lifecycle: experimental
  owner: backstage-team
  system: backstage-temporal-system

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: backstage-temporal-system
  description: System integrating Backstage with Temporal workflows
spec:
  owner: backstage-team
