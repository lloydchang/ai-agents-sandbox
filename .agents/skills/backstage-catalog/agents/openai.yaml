interface:
  display_name: "Backstage Catalog Manager"
  short_description: "Manage Backstage software catalog and components"
  icon_small: "./assets/backstage-icon.svg"
  icon_large: "./assets/backstage-logo.png"
  brand_color: "#24B47E"
  default_prompt: "Help me manage the Backstage catalog"
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "backstage"
      description: "Backstage catalog API"
      transport: "streamable_http"
      url: "http://localhost:3000"
