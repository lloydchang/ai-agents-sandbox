app:
  title: ai agents sandbox 

backend:
  baseUrl: http://localhost:8081
  listen:
    port: 8081

organization:
  name: Backstage

frontend:
  baseUrl: http://localhost:3000

techdocs:
  storageUrl: http://localhost:7007/api/techdocs/static/docs

proxy:
  '/temporal-proxy':
    target: http://localhost:8081/api/temporal-proxy
    changeOrigin: true
    pathRewrite:
      '^/api/proxy/temporal-proxy': ''
  '/catalog':
    target: http://localhost:8081/api/catalog
    changeOrigin: true

auth:
  environment: development

scaffolder:
  auth:
    providers:
      guest: {}

catalog:
  providers:
    entity:
      github:
        organization: 'backstage'
        catalogPath: '/catalog-info.yaml'
  locations:
    - type: file
      target: ../../catalog-info.yaml

temporal:
  backendUrl: http://localhost:8081

# RAG AI Plugin Configuration
ragAi:
  # OpenAI Embeddings Configuration
  openai:
    apiBaseUrl: https://api.openai.com/v1
    modelName: text-embedding-3-small
    apiKey: ${RAG_AI_OPENAI_API_KEY}

  # AWS Bedrock Embeddings Configuration
  aws:
    region: us-west-2
    modelId: amazon.titan-embed-text-v1

  # Vector Storage Configuration (PostgreSQL with pgvector)
  storage:
    type: pgvector
    host: ${POSTGRES_HOST:-localhost}
    port: ${POSTGRES_PORT:-5432}
    database: ${POSTGRES_DB:-rag_ai}
    user: ${POSTGRES_USER:-rag_user}
    password: ${POSTGRES_PASSWORD}
    ssl: false

  # Retrieval Configuration
  retrieval:
    maxResults: 5
    similarityThreshold: 0.7
    rerank: true

  # Content Sources
  content:
    sources:
      - type: techdocs
        enabled: true
      - type: catalog
        enabled: true
      - type: custom
        enabled: false

  # AI Assistant Configuration
  assistant:
    model: gpt-4
    temperature: 0.7
    maxTokens: 1000
    systemPrompt: |
      You are an AI assistant integrated with Backstage. You have access to the catalog,
      technical documentation, and other organizational knowledge. Help users navigate
      and understand their software ecosystem. Be helpful, accurate, and concise.
